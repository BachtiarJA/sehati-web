version: '3.8'

services:
  # SERVICE 1: Frontend / Web Node.js
  frontend:
    build: 
      context: .
      dockerfile: frontend-nodejs/Dockerfile
    container_name: web_frontend_node
    ports:
      - '5173:5173'
    depends_on:
      - backend

  # SERVICE 2: Backend API Laravel
  backend:
    build: .
    container_name: web_backend_laravel
    command: php artisan serve --host=0.0.0.0 --port=80
    ports:
      - '8000:80'
    depends_on:
      - db-server

  # SERVICE 3: Database MySQL
  db-server:
    image: mysql:8.0
    container_name: db_kelompok30
    environment:
      - MYSQL_ROOT_PASSWORD=gRfT62$77
      - MYSQL_DATABASE=sehati_db
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
